<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Configuration Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 10px; }
        .info { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #333; font-weight: 500; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 1rem; }
        textarea { resize: vertical; min-height: 80px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 3px rgba(0,123,255,0.25); }
        .btn { background: #007bff; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .btn:hover { background: #0056b3; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .result.success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .result.error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .result h3 { margin-bottom: 10px; }
        .result pre { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 3px; overflow-x: auto; font-size: 0.85rem; }
        .loading { display: none; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #007bff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>📧 Email Configuration Tester</h1>
    <p class="info">Test your email settings to verify they're working correctly.</p>

    <form id="testerForm">
        <div class="form-group">
            <label for="method">Email Method</label>
            <select id="method" name="method">
                <option value="mail">PHP mail() function (localhost)</option>
                <option value="smtp">SMTP Server</option>
            </select>
        </div>

        <div id="smtpFields" style="display: none;">
            <div class="form-group">
                <label for="host">SMTP Host</label>
                <input type="text" id="host" placeholder="e.g., smtp.gmail.com">
            </div>

            <div class="form-group">
                <label for="port">SMTP Port</label>
                <input type="number" id="port" value="587" min="1" max="65535">
            </div>

            <div class="form-group">
                <label for="username">SMTP Username</label>
                <input type="text" id="username" placeholder="your-mailtrap-username">
            </div>

            <div class="form-group">
                <label for="password">SMTP Password</label>
                <input type="password" id="password" placeholder="App password (not regular password)">
            </div>

            <div class="form-group">
                <label for="encryption">Encryption</label>
                <select id="encryption">
                    <option value="tls">TLS</option>
                    <option value="ssl">SSL</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="from_email">From Email Address</label>
            <input type="email" id="from_email" placeholder="noreply@yourdomain.com">
        </div>

        <div class="form-group">
            <label for="from_name">From Name</label>
            <input type="text" id="from_name" placeholder="SupportDesk" value="SupportDesk">
        </div>

        <div class="form-group">
            <label for="to_email">Test Email (send to)</label>
            <input type="email" id="to_email" placeholder="your-email@example.com">
        </div>

        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" placeholder="Test Email from SupportDesk" value="Test Email from SupportDesk">
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" placeholder="This is a test email to verify your configuration.">This is a test email to verify your email configuration is working correctly. If you received this, everything is set up properly!</textarea>
        </div>

        <button type="submit" class="btn">
            <span class="loading"><span class="spinner"></span> Sending...</span>
            <span>Send Test Email</span>
        </button>
    </form>

    <div id="result" class="result">
        <h3 id="resultTitle"></h3>
        <div id="resultMessage"></div>
    </div>
</div>

<script>
const form = document.getElementById('testerForm');
const methodSelect = document.getElementById('method');
const smtpFields = document.getElementById('smtpFields');
const resultDiv = document.getElementById('result');
const resultTitle = document.getElementById('resultTitle');
const resultMessage = document.getElementById('resultMessage');
const loadingSpan = document.querySelector('.loading');
const submitSpan = document.querySelector('button > span:last-child');

methodSelect.addEventListener('change', function() {
    smtpFields.style.display = this.value === 'smtp' ? 'block' : 'none';
});

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const method = document.getElementById('method').value;
    const data = {
        method: method,
        from_email: document.getElementById('from_email').value,
        from_name: document.getElementById('from_name').value,
        to_email: document.getElementById('to_email').value,
        subject: document.getElementById('subject').value,
        message: document.getElementById('message').value,
    };

    if (method === 'smtp') {
        data.host = document.getElementById('host').value;
        data.port = document.getElementById('port').value;
        data.username = document.getElementById('username').value;
        data.password = document.getElementById('password').value;
        data.encryption = document.getElementById('encryption').value;
    }

    // Validate required fields
    if (!data.from_email || !data.to_email) {
        resultDiv.className = 'result error';
        resultTitle.textContent = '❌ Error';
        resultMessage.textContent = 'Please fill in all required fields.';
        resultDiv.style.display = 'block';
        return;
    }

    // Show loading state
    loadingSpan.style.display = 'inline';
    submitSpan.style.display = 'none';
    form.querySelector('button').disabled = true;

    try {
        const response = await fetch('test-email.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        resultDiv.className = 'result ' + (result.success ? 'success' : 'error');
        resultTitle.textContent = result.success ? '✅ Success!' : '❌ Error';
        
        let message = result.message || '';
        if (result.debug) {
            message += '\n\nDebug Info:\n' + JSON.stringify(result.debug, null, 2);
        }
        
        resultMessage.innerHTML = '<pre>' + escapeHtml(message) + '</pre>';
        resultDiv.style.display = 'block';
        resultDiv.scrollIntoView({ behavior: 'smooth' });

    } catch (error) {
        resultDiv.className = 'result error';
        resultTitle.textContent = '❌ Error';
        resultMessage.textContent = 'Network error: ' + error.message;
        resultDiv.style.display = 'block';
    } finally {
        loadingSpan.style.display = 'none';
        submitSpan.style.display = 'inline';
        form.querySelector('button').disabled = false;
    }
});

function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, m => map[m]);
}
</script>

</body>
</html>
